#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

[default_session]
preview_command = "eza -a -l -1 --git --icons=always --color=always {}"
startup_command = "nvim"

[[session]]
name = "sc-website"
path = "~/Documents/Development/salesclub/sales-battle-scoreboard"
windows = ["claude", "git"]

[[session]]
name = "salesdock"
path = "~/Documents/Development/salesclub/salesdock-worker"
windows = ["claude", "git"]

[[session]]
name = "kpi"
path = "~/Documents/Development/salesclub/kpi-worker"
windows = ["claude", "git"]

[[session]]
name = "leads"
path = "~/Documents/Development/salesclub/leads-data"
windows = ["claude", "git"]

[[session]]
name = "wa worker"
path = "~/Documents/Development/salesclub/whatsapp-worker"
windows = ["claude", "git"]

[[session]]
name = "wa service"
path = "~/Documents/Development/salesclub/whatsapp-service"
windows = ["claude", "git"]

[[session]]
name = "gebieden"
path = "~/Documents/Development/salesclub/gebieden-worker"
windows = ["claude", "git"]

[[wildcard]]
pattern = "~/Documents/Development/salesclub/*"
windows = ["claude", "git"]

[[session]]
name = "servers"
path = "~/Documents/Development/salesclub"
startup_command = "btop"
windows = [
  "pages server",
  "salesdock server",
  "kpi server",
  "leads server",
  "wa worker server",
  "wa service server",
  "gebieden server",
]

[[session]]
name = "thesis implementation"
path = "~/Documents/Studie/thesis/rust-fitting-curvature"
windows = ["git", "claude", "thesis webserver"]

[[window]]
name = "thesis webserver"
path = "~/Documents/Studie/thesis/rust-fitting-curvature"
startup_script = "./build.sh"

[[window]]
name = "dotfiles"
path = "~/dotfiles"

[[window]]
name = "git"
startup_script = "lazygit"

[[window]]
name = "claude"
startup_script = "claude"

[[window]]
name = "pages server"
path = "~/Documents/Development/salesclub/sales-battle-scoreboard"
startup_script = "npm run pages -- --port 8080 --inspector-port 9080"

[[window]]
name = "salesdock server"
path = "~/Documents/Development/salesclub/salesdock-worker"
startup_script = "npm run dev -- --port 8101 --inspector-port 9101"

[[window]]
name = "leads server"
path = "~/Documents/Development/salesclub/leads-data"
startup_script = "npm run dev -- --port 8102 --inspector-port 9102"

[[window]]
name = "kpi server"
path = "~/Documents/Development/salesclub/kpi-worker"
startup_script = "npm run dev -- --port 8103 --inspector-port 9103"

[[window]]
name = "report server"
path = "~/Documents/Development/salesclub/report-worker"
startup_script = "npm run dev -- --port 8104 --inspector-port 9104"

[[window]]
name = "wa worker server"
path = "~/Documents/Development/salesclub/whatsapp-worker"
startup_script = "npm run dev -- --inspector-port 9793"
# This worker runs on port 8793

[[window]]
name = "wa service server"
path = "~/Documents/Development/salesclub/whatsapp-service"
startup_script = "npm run mock"
#This report runs on port 3100

[[window]]
name = "gebieden server"
path = "~/Documents/Development/salesclub/gebieden-worker"
startup_script = "npm run dev -- --port 8792 --inspector-port 9792"
