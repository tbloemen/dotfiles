set -g mouse on
set -g default-terminal "tmux-256color"

# for images in kitty
set -g allow-passthrough on

# set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Un-named windows (plain shells) show the current dir basename instead of the running command. 
# Windows explicitly named by sesh have automatic-rename off, so they keep their sesh name and are unaffected.
set -g automatic-rename-format "#{?pane_in_mode,[tmux],#{b:pane_current_path}}#{?pane_dead,[dead],}"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Keep the status-right module text legible across flavours. The plugin freezes
# each module's fg to the flavour active when it first loads (it stores the
# resolved colour with `set -o`). Storing an unresolved reference instead makes
# tmux re-resolve it on every flavour change. Add a line here per status module.
set -g @catppuccin_status_application_text_fg "#{@thm_fg}"
set -g @catppuccin_status_session_text_fg "#{@thm_fg}"
set -g @catppuccin_status_uptime_text_fg "#{@thm_fg}"

# On a flavour change, @catppuccin_reset clears the cached @thm_* colours so the
# new flavour applies, but it also reverts every custom catppuccin option to its
# default: the window style drops to "basic" and the window text falls back to a
# bare "#T" (which makes manual rename-window appear to do nothing). So after the
# reset run we re-assert "rounded", clear the current-window separators (which use
# `set -o` and would otherwise stay basic), and re-point the window text at
# @window_label (see below), then rebuild once more.
set-hook -g client-dark-theme {
  set -g @catppuccin_flavor "mocha"
  set -g @catppuccin_reset "true"
  run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
  set -g @catppuccin_window_status_style "rounded"
  set -gu @catppuccin_window_current_left_separator
  set -gu @catppuccin_window_current_middle_separator
  set -gu @catppuccin_window_current_right_separator
  set -g @catppuccin_window_text " #{E:@window_label}"
  set -g @catppuccin_window_current_text " #{E:@window_label}"
  run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
}
set-hook -g client-light-theme {
  set -g @catppuccin_flavor "latte"
  set -g @catppuccin_reset "true"
  run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
  set -g @catppuccin_window_status_style "rounded"
  set -gu @catppuccin_window_current_left_separator
  set -gu @catppuccin_window_current_middle_separator
  set -gu @catppuccin_window_current_right_separator
  set -g @catppuccin_window_text " #{E:@window_label}"
  set -g @catppuccin_window_current_text " #{E:@window_label}"
  run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
}
set -g @catppuccin_window_status_style 'rounded'

# Window label:
# show Claude's live pane title (#T, e.g. "✳ Claude Code" or the current task) only while claude is the foreground command;
# for everything else show the window name (#W) — what sesh sets ("git", "claude", ...) or, for plain windows, the dir basename from automatic-rename-format.
#
# Keying off the live command (not the title text) matters:
# #T goes stale after an app exits (a shell prompt won't reset it with allow-rename off), so this snaps back to #W the instant claude exits.
#
# Defined once in a plain user option; the catppuccin options just reference it via #{E:...}.
# @catppuccin_reset (fired by the theme hooks above) wipes the catppuccin options back to
# their default " #T", so those hooks must re-assert these two lines. @window_label itself is
# not a catppuccin option, so it survives the reset and stays the single source of truth.
set -g @window_label "#{?#{m/r:^claude$,#{pane_current_command}},#T,#W}"
set -g @catppuccin_window_text " #{E:@window_label}"
set -g @catppuccin_window_current_text " #{E:@window_label}"

# set -g @continuum-restore 'off'

# Status bar at the top
set-option -g status-position top

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'alexwforsythe/tmux-which-key'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
run 'tpack init'

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind _ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Don't ask confirmation for killing panes
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
bind-key X kill-session # kill whole session with X
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# Set sesh picker
bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
