git:
  pagers:
    - externalDiffCommand: difft --color=always

customCommands:
  - key: "t"
    command: "gh pr create --fill"
    context: "localBranches"
    description: "Create Pull Request"

# Theme (gui.theme + authorColors) comes from the Catppuccin preset, merged in
# via $LG_CONFIG_FILE — see ~/.local/share/darkman/lazygit.sh and hyprland.lua.
